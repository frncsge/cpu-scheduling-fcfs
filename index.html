<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FCFS Scheduling Simulator</title>

    <style>
      /* ===== GLOBAL ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1e1e2f, #2b2b45);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      /* ===== HEADER ===== */
      header {
        text-align: center;
        margin-bottom: 20px;
      }

      header h1 {
        font-size: 2rem;
        font-weight: 600;
      }

      header p {
        opacity: 0.7;
      }

      /* ===== CARD ===== */
      .card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
        transition: 0.3s ease;
      }

      .card:hover {
        transform: translateY(-3px);
      }

      /* ===== INPUTS ===== */
      .input-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      input {
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }

      .btn-primary {
        background: #6c63ff;
        color: white;
      }
      .btn-danger {
        background: #ff5c5c;
        color: white;
      }
      .btn-success {
        background: #00c896;
        color: white;
      }

      /* ===== TABLE ===== */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      th,
      td {
        padding: 10px;
        text-align: center;
      }

      tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* ===== GANTT ===== */
      #gantt {
        display: flex;
        margin-top: 20px;
        overflow-x: auto;
      }

      .bar {
        padding: 10px;
        margin-right: 2px;
        text-align: center;
        border-radius: 6px;
        color: black;
        font-weight: bold;
        animation: fadeIn 0.5s ease forwards;
      }

      /* ===== ANIMATION ===== */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* ===== LOADER ===== */
      .loader {
        display: none;
        text-align: center;
        margin-top: 10px;
      }

      .loader.active {
        display: block;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 600px) {
        .input-group {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>FCFS Scheduling Simulator</h1>
      <p>Visualize First Come First Serve CPU Scheduling</p>
    </header>

    <!-- INPUT CARD -->
    <div class="card">
      <div class="input-group">
        <input type="text" id="pid" placeholder="Process ID" />
        <input type="number" id="arrival" placeholder="Arrival Time" />
        <input type="number" id="burst" placeholder="Burst Time" />

        <button class="btn-primary" onclick="addProcess()">Add</button>
        <button class="btn-danger" onclick="clearAll()">Clear</button>
        <button class="btn-success" onclick="runSimulation()">Run</button>
      </div>
    </div>

    <!-- PROCESS TABLE -->
    <div class="card">
      <h3>Processes</h3>
      <table id="processTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Arrival</th>
            <th>Burst</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- RESULTS -->
    <div class="card">
      <h3>Results</h3>
      <div class="loader" id="loader">Calculating...</div>
      <table id="resultTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Start</th>
            <th>Completion</th>
            <th>Turnaround</th>
            <th>Waiting</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <p id="averages"></p>

      <div id="gantt"></div>
    </div>

    <script type="module" src="./js/index.js"></script>
  </body>
</html>
